name: Python

on:
  push:
    branches: ["main"]
    paths:
      - "scripts/**/*.py"
      - ".github/workflows/python.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "scripts/**/*.py"
      - ".github/workflows/python.yml"

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install ruff
      - run: ruff check scripts/

  typecheck:
    name: ty
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install ty
      - run: ty check scripts/
